{% extends "base.html" %}

{% block contenido %}
<div class="p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="text-white">Usuarios</h4>
        <button class="btn btn-sm btn-primary-custom px-5 py-2" data-bs-toggle="modal" data-bs-target="#modal-user">
            <i class="bi bi-person-plus me-1"></i> Agregar Usuario
        </button>
    </div>

    <div class="mb-3">
        <input type="text" class="form-control" placeholder="Buscar usuario...">
    </div>

    <table class="table table-hover  ms-aut"
        style="background-color: #6f42c1;color: white; border: 2px solid #2a2a4a; border-radius: 8px;">
        <thead style="border-bottom: 2px solid #7F77DD;">
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            {% for user in users %}
            <tr>
                <td>{{user.name}}</td>
                <td>{{user.email}}</td>
                <td>
                    <span class="badge badge-{{ user.rol }}">{{ user.rol | capitalize }}</span>
                </td>
                <td>
                    <button class="btn btn-sm btn-warning">Editar</button>
                    <button class="btn btn-sm btn-danger">Eliminar</button>
                </td>
            </tr>
            {% endfor %}


        </tbody>
    </table>


    <div class="modal fade" id="modal-user">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Agregar Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form method="POST" action="{{ url_for('users.create') }}" id="form-user">
                        <div class="mb-3">
                            <label class="form-label" for="user-name">Nombre</label>
                            <input class="form-control" type="text" name="name" id="user-name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-email">Correo</label>
                            <input class="form-control" type="email" name="email" id="user-email">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-rol">Rol</label>
                            <select name="rol" class="form-select" id="user-rol">
                                <option value="admin">Admin</option>
                                <option value="encargado">Encargado</option>
                                <option value="gerente">Gerente</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-password">Contraseña</label>
                            <input class="form-control" type="password" name="password" id="user-password">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button data-bs-dismiss="modal" class="btn btn-secondary">Cancelar</button>
                    <button class="btn btn-primary-custom" form="form-user">Guardar</button>
                </div>
            </div>
        </div>
    </div>


</div>


{% endblock %}
