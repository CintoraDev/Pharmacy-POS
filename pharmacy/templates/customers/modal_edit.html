{% for customer in customers %}
<div class="modal fade" id="modal-edit-{{ customer.id }}" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Perfil de Cliente</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form method="POST" action="{{ url_for('customers.update', id=customer.id) }}"
                    id="form-edit-customer-{{ customer.id }}">
                    <div class="row g-3">
                        <div class="col-md-7">
                            <label class="form-label">NOMBRE / RAZÓN SOCIAL</label>
                            <input type="text" class="form-control" name="name" value="{{ customer.name }}" required>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">RFC</label>
                            <input type="text" class="form-control mono" name="rfc" value="{{ customer.rfc }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">CORREO</label>
                            <input type="email" class="form-control" name="email" value="{{ customer.email }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">TELÉFONO</label>
                            <input type="tel" class="form-control" name="phone" value="{{ customer.phone }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">DIRECCIÓN</label>
                            <input type="text" class="form-control" name="address" value="{{ customer.address }}"
                                required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">CIUDAD</label>
                            <input type="text" class="form-control" name="city" value="{{ customer.city }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">ESTADO</label>
                            <input type="text" class="form-control" name="state" value="{{ customer.state }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">C.P.</label>
                            <input type="text" class="form-control mono" name="zip_code" value="{{ customer.zip_code }}"
                                required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">RÉGIMEN FISCAL</label>
                            <input type="text" class="form-control" name="fiscal_regimen"
                                value="{{ customer.fiscal_regimen }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">FECHA NACIMIENTO</label>
                            <input type="date" class="form-control" name="birth_date" value="{{ customer.birth_date }}">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-ghost" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn-primary-custom px-4" form="form-edit-customer-{{ customer.id }}">Actualizar
                    Datos</button>
            </div>
        </div>
    </div>
</div>
{% endfor %}
