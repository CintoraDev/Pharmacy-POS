<div class="modal fade" id="modal-customer" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Registrar Nuevo Cliente</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form method="POST" action="{{ url_for('customers.create') }}" id="form-customer">
                    <div class="row g-3">
                        <div class="col-md-7">
                            <label class="form-label">NOMBRE COMPLETO</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">RFC</label>
                            <input type="text" class="form-control mono" name="rfc" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">CORREO ELECTRÓNICO</label>
                            <input type="email" class="form-control" name="email">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">TELÉFONO</label>
                            <input type="tel" class="form-control" name="phone">
                        </div>
                        <div class="col-12">
                            <label class="form-label">DIRECCIÓN FISCAL</label>
                            <input type="text" class="form-control" name="address" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">CIUDAD</label>
                            <input type="text" class="form-control" name="city" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">ESTADO</label>
                            <input type="text" class="form-control" name="state" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">CÓDIGO POSTAL</label>
                            <input type="text" class="form-control mono" name="zip_code" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">RÉGIMEN FISCAL</label>
                            <input type="text" class="form-control" name="fiscal_regimen" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">FECHA NACIMIENTO</label>
                            <input type="date" class="form-control" name="birth_date">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-ghost" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn-primary-custom px-4" form="form-customer">Guardar Cliente</button>
            </div>
        </div>
    </div>
</div>
