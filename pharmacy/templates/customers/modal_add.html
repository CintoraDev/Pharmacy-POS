<div class="modal fade" id="modal-customer">
    <div class="modal-dialog modal-dialog-scrollable modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Agregar Cliente</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form method="POST" action="{{ url_for('customers.create') }}" id="form-customer">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="cust-name" class="form-label">Nombre</label>
                            <input type="text" class="form-control" name="name" id="cust-name" required>
                        </div>

                        <div class="col-md-6">
                            <label for="cust-rfc" class="form-label">RFC</label>
                            <input type="text" class="form-control" name="rfc" id="cust-rfc" required>
                        </div>

                        <div class="col-md-6">
                            <label for="cust-email" class="form-label">Correo</label>
                            <input type="email" class="form-control" name="email" id="cust-email">
                        </div>

                        <div class="col-md-6">
                            <label for="cust-phone" class="form-label">Teléfono</label>
                            <input type="tel" class="form-control" name="phone" id="cust-phone">
                        </div>

                        <div class="col-md-6">
                            <label for="cust-address" class="form-label">Dirección</label>
                            <input type="text" class="form-control" name="address" id="cust-address" required>
                        </div>

                        <div class="col-md-6">
                            <label for="cust-city" class="form-label">Ciudad</label>
                            <input type="text" class="form-control" name="city" id="cust-city" required>
                        </div>

                        <div class="col-md-6">
                            <label for="cust-state" class="form-label">Estado</label>
                            <input type="text" class="form-control" name="state" id="cust-state" required>
                        </div>

                        <div class="col-md-6">
                            <label for="cust-zip" class="form-label">Código Postal</label>
                            <input type="text" class="form-control" name="zip_code" id="cust-zip" required>
                        </div>

                        <div class="col-md-6">
                            <label for="cust-fiscal-regimen" class="form-label">Régimen Fiscal</label>
                            <input type="text" class="form-control" name="fiscal_regimen" id="cust-fiscal-regimen"
                                required>
                        </div>

                        <div class="col-md-6">
                            <label for="cust-birth-date" class="form-label">Fecha de Nacimiento</label>
                            <input type="date" class="form-control" name="birth_date" id="cust-birth-date">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button data-bs-dismiss="modal" class="btn btn-secondary">Cancelar</button>
                <button class="btn btn-primary-custom" form="form-customer">Guardar</button>
            </div>
        </div>
    </div>
</div>
