<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <title>Iniciar Sesión</title>
    <style>
        .form-label {
            color: white;
        }

        .form-control::placeholder {
            color: #6b6b8a;
        }

        .form-control {
            background-color: #16213e;
            border: 1px solid #2a2a4a;
            color: white;
        }

        .form-control:focus {
            background-color: #16213e;
            border-color: #7F77DD;
            color: white;
            box-shadow: none;
        }
    </style>
</head>

<body style="background-color: #0f0f1a;">
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card p-5 rounded-4" style="width: 450px; background-color: #0000005e; border: 1px solid #2a2a4a;">
            <div class="text-center mb-4">
                <i class="bi bi-capsule" style="color: #7F77DD; font-size: 2.5rem;"></i>
                <h4 class="text-white mt-2">Farmacia CUCEI</h4>
                <p style="color:#e1d9d94a ;">Inicia sesión para continuar</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" placeholder="Ingresa Usuario">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="********">
                </div>
                <button class="btn py-2 mt-4 form-control" type="submit"
                    style="background-color: #7F77DD; color: white; border: none;">Iniciar Sesión</button>
            </form>
        </div>
    </div>
</body>

</html>
