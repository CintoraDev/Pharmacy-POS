<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <title>Login | Farmacia CUCEI</title>
    <style>
        :root {
            --bg-base: #0a0c10;
            --bg-surface: #111318;
            --accent: #00d4aa;
            --accent-glow: rgba(0, 212, 170, 0.25);
            --border: #252830;
            --text-secondary: #7a7f8e;
        }

        body {
            background-color: var(--bg-base);
            font-family: 'DM Sans', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .logo-box {
            width: 48px;
            height: 48px;
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid var(--accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 24px;
            margin: 0 auto 20px;
        }

        .form-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-control {
            background: #181b22;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 8px;
        }

        .form-control:focus {
            background: #1e2128;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
            color: white;
        }

        .btn-login {
            background: var(--accent);
            color: #0a0c10;
            font-weight: 600;
            border: none;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-login:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 20px var(--accent-glow);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo-box">
            <i class="bi bi-capsule"></i>
        </div>
        <div class="text-center mb-4">
            <h4 class="fw-bold mb-1">Farmacia CUCEI</h4>
            <p class="text-secondary small">Sistema de Punto de Venta</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" name="email" class="form-control" placeholder="nombre@ejemplo.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-login w-100">Acceder al Sistema</button>
        </form>

        <div class="text-center mt-2 pt-2">
            <small class="text-secondary" style="font-size: 0.7rem; opacity: 0.7;">
                Desarrollado por <span style="color: var(--accent);">Carlos Cintora</span>
            </small>
        </div>
    </div>
</body>

</html>
